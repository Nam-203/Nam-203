<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 16" width="100%" height="16">
  <defs>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(56, 189, 248, 0)" />
      <stop offset="20%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="80%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="rgba(236, 72, 153, 0)" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Glowing background line -->
  <line x1="50" y1="8" x2="850" y2="8" stroke="url(#dividerGrad)" stroke-width="4" opacity="0.3" filter="url(#glow)" />
  <!-- Core sharp line -->
  <line x1="50" y1="8" x2="850" y2="8" stroke="url(#dividerGrad)" stroke-width="1.5" />
</svg>
